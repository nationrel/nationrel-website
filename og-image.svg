<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A"/>
      <stop offset="100%" style="stop-color:#0369A1"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#38BDF8"/>
      <stop offset="100%" style="stop-color:#818CF8"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- 装饰圆形 -->
  <circle cx="1050" cy="120" r="220" fill="white" fill-opacity="0.04"/>
  <circle cx="950" cy="550" r="150" fill="white" fill-opacity="0.03"/>
  <circle cx="100" cy="500" r="180" fill="white" fill-opacity="0.03"/>

  <!-- 顶部装饰线 -->
  <rect x="80" y="60" width="80" height="4" rx="2" fill="url(#accent)"/>

  <!-- 公司英文名 -->
  <text x="80" y="110" font-family="Arial, sans-serif" font-size="22" font-weight="600" fill="#38BDF8" letter-spacing="4">NATIONREL</text>

  <!-- 公司中文名 -->
  <text x="80" y="210" font-family="Arial, sans-serif" font-size="68" font-weight="800" fill="white">国可工软</text>

  <!-- 副标题 -->
  <text x="80" y="280" font-family="Arial, sans-serif" font-size="36" font-weight="400" fill="#94A3B8">质量可靠性工业软件专家</text>

  <!-- 分隔线 -->
  <rect x="80" y="320" width="600" height="1" fill="white" fill-opacity="0.15"/>

  <!-- 产品标签 -->
  <rect x="80" y="350" width="120" height="38" rx="6" fill="white" fill-opacity="0.1"/>
  <text x="140" y="374" font-family="Arial, sans-serif" font-size="16" fill="white" text-anchor="middle">FMEA</text>

  <rect x="216" y="350" width="120" height="38" rx="6" fill="white" fill-opacity="0.1"/>
  <text x="276" y="374" font-family="Arial, sans-serif" font-size="16" fill="white" text-anchor="middle">Weibull</text>

  <rect x="352" y="350" width="100" height="38" rx="6" fill="white" fill-opacity="0.1"/>
  <text x="402" y="374" font-family="Arial, sans-serif" font-size="16" fill="white" text-anchor="middle">SPC</text>

  <rect x="468" y="350" width="100" height="38" rx="6" fill="white" fill-opacity="0.1"/>
  <text x="518" y="374" font-family="Arial, sans-serif" font-size="16" fill="white" text-anchor="middle">FTA</text>

  <rect x="584" y="350" width="100" height="38" rx="6" fill="white" fill-opacity="0.1"/>
  <text x="634" y="374" font-family="Arial, sans-serif" font-size="16" fill="white" text-anchor="middle">MSA</text>

  <!-- 核心数字统计 -->
  <text x="80" y="460" font-family="Arial, sans-serif" font-size="52" font-weight="800" fill="url(#accent)">20+</text>
  <text x="80" y="490" font-family="Arial, sans-serif" font-size="17" fill="#64748B">年深耕</text>

  <text x="260" y="460" font-family="Arial, sans-serif" font-size="52" font-weight="800" fill="url(#accent)">1000+</text>
  <text x="260" y="490" font-family="Arial, sans-serif" font-size="17" fill="#64748B">签约客户</text>

  <text x="490" y="460" font-family="Arial, sans-serif" font-size="52" font-weight="800" fill="url(#accent)">15+</text>
  <text x="490" y="490" font-family="Arial, sans-serif" font-size="17" fill="#64748B">核心产品</text>

  <!-- 网站地址 -->
  <text x="80" y="580" font-family="Arial, sans-serif" font-size="20" fill="#475569">www.nationrel.com</text>
  <text x="1120" y="580" font-family="Arial, sans-serif" font-size="16" fill="#475569" text-anchor="end">4000-032-330</text>
</svg>